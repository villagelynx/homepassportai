[build]
  command = "npm run build"
  publish = "."

# Custom domain: homepassportai.com (configure in Netlify Domain management)

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."analyze"]
  timeout = 26

[functions."analyze-room"]
  timeout = 26

[functions."health"]
  timeout = 10

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/analyze-room"
  to = "/.netlify/functions/analyze-room"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, X-OpenAI-Api-Key"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
